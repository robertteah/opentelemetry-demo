name: jaeger elasticsearch-mappings
synopsis: |
    Jaeger esmapping-generator prints rendered mappings as string
description: |
    Jaeger esmapping-generator renders passed templates with provided values and prints rendered output to stdout
usage: jaeger elasticsearch-mappings [flags]
options:
    - name: es-version
      default_value: "7"
      usage: The major Elasticsearch version
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for elasticsearch-mappings
    - name: ilm-policy-name
      default_value: jaeger-ilm-policy
      usage: The name of the ILM policy to use if ILM is active
    - name: index-prefix
      usage: Specifies index prefix
    - name: mapping
      usage: |
        The index mapping the template will be applied to. Pass either jaeger-span or jaeger-service
    - name: replicas
      default_value: "1"
      usage: The number of replicas per index in Elasticsearch
    - name: shards
      default_value: "5"
      usage: The number of shards per index in Elasticsearch
    - name: use-ilm
      default_value: "false"
      usage: |
        Set to true to use ILM for managing lifecycle of jaeger indices
see_also:
    - jaeger - Jaeger backend v2
