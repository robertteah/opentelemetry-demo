name: jaeger
synopsis: Jaeger backend v2
description: Jaeger backend v2
usage: jaeger [flags]
options:
    - name: config
      default_value: '[]'
      usage: |
        Locations to the config file(s), note that only a single location can be set per flag entry e.g. `--config=file:/path/to/first --config=file:path/to/second`.
    - name: feature-gates
      default_value: |
        confighttp.framedSnappy,-confmap.enableMergeAppendOption,-connector.spanmetrics.legacyMetricNames,exporter.PersistRequestContext,-exporter.kafkaexporter.UseFranzGo,-exporter.prometheusexporter.DisableAddMetricSuffixes,-filter.filterlog.useOTTLBridge,-filter.filtermetric.useOTTLBridge,-filter.filterspan.useOTTLBridge,jaeger.es.disableLegacyId,jaeger.sampling.includeDefaultOpStrategies,-otelcol.printInitialConfig,pkg.translator.prometheus.NormalizeName,-pkg.translator.prometheus.PermissiveLabelSanitization,-processor.tailsamplingprocessor.disableinvertdecisions,-processor.tailsamplingprocessor.metricstatcountspanssampled,-processor.tailsamplingprocessor.recordpolicy,receiver.jaeger.DisableRemoteSampling,-receiver.kafkareceiver.UseFranzGo,-service.AllowNoPipelines,-service.noopTracerProvider,-service.profilesSupport,telemetry.UseLocalHostAsDefaultMetricsAddress,-telemetry.disableHighCardinalityMetrics,-telemetry.newPipelineTelemetry
      usage: |
        Comma-delimited list of feature gate identifiers. Prefix with '-' to disable the feature. '+' or no prefix will enable the feature.
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for jaeger
    - name: set
      usage: |
        Set arbitrary component config property. The component has to be defined in the config file and the flag has a higher precedence. Array config properties are overridden and maps are joined. Example --set=processors.batch.timeout=2s
see_also:
    - jaeger completion - Generate the autocompletion script for the specified shell
    - jaeger components - Outputs available components in this collector distribution
    - jaeger docs - Generates documentation
    - jaeger elasticsearch-mappings - Jaeger esmapping-generator prints rendered mappings as string
    - jaeger featuregate - Display feature gates information
    - jaeger print-initial-config - Prints the Collector's configuration in YAML format after all config sources are resolved and merged
    - jaeger validate - Validates the config without running the collector
    - jaeger version - Print the version.
