receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:4317"
      http:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:4318"

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: memory

extensions:
  jaeger_storage:
    backends:
      memory:
        memory:
          max_traces: ${env:MEMORY_MAX_TRACES:-25000}
    metric_backends:
      prometheus:
        prometheus:
          endpoint: "http://${env:PROMETHEUS_ADDR}"
          normalize_calls: true
          normalize_duration: true
  jaeger_query:
    storage:
      traces: memory
      metrics: prometheus
    base_path: /jaeger/ui
    grpc:
      endpoint: 0.0.0.0:16685
    http:
      endpoint: 0.0.0.0:16686

service:
  extensions:
    - jaeger_storage
    - jaeger_query
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]
